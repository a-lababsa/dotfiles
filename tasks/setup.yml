version: '3'

includes:
  utils: ../scripts/utils.yml

tasks:
  install-essential-packages:
    desc: Installer les paquets essentiels
    cmds:
      - task: utils:confirm
        vars: { TASK: "les paquets essentiels" }
      - |
        echo "📦 Updating package lists and installing essential packages..."
        sudo apt update && sudo apt upgrade -y
        sudo apt install -y \
          zsh \
          vim \
          git \
          curl \
          wget \
          build-essential \
          wslu \
          python3 \
          python3-pip \
          software-properties-common \
          apt-transport-https \
          ca-certificates \
          gnupg \
          lsb-release
        echo "✅ Essential packages installed"

  install-starship:
    desc: Installer le prompt Starship
    cmds:
      - task: utils:confirm
        vars: { TASK: "Starship prompt" }
      - curl -sS https://starship.rs/install.sh | sh
      - echo "Starship prompt installé"

  install-task:
    desc: Installer Task (gestionnaire de tâches)
    cmds:
      - task: utils:confirm
        vars: { TASK: "Task (gestionnaire de tâches)" }
      - sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin
      - echo "Task installé"
