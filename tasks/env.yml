version: "3"

includes:
  utils: ../scripts/utils.yml

tasks:
  nvm-setup:
    desc: Installer NVM (Node Version Manager)
    cmds:
      - task: utils:confirm
        vars: { TASK: "NVM (Node Version Manager)" }
      - chmod +x ./scripts/version-utils.sh
      - |
        source ./scripts/version-utils.sh
        if [[ -s "$HOME/.nvm/nvm.sh" ]]; then
          source "$HOME/.nvm/nvm.sh"
          if check_version "nvm" "{{.NVM_VERSION}}" "nvm --version"; then
            exit 0
          fi
        fi
        install_script=$(download_with_cache "https://raw.githubusercontent.com/nvm-sh/nvm/v{{.NVM_VERSION}}/install.sh" "nvm-install.sh")
        bash "$install_script"
      - echo "✅ NVM installé"

  conda-setup:
    desc: Installer Miniconda
    cmds:
      - task: utils:confirm
        vars: { TASK: "Miniconda (gestionnaire d'environnements Python)" }
      - |
        source ./scripts/version-utils.sh
        if [[ -d "$HOME/miniconda3" && -f "$HOME/miniconda3/bin/conda" ]]; then
          echo "✅ Miniconda already installed at ~/miniconda3"
          exit 0
        fi
        mkdir -p ~/miniconda3
        installer=$(download_with_cache "https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh" "miniconda-installer.sh")
        bash "$installer" -b -u -p ~/miniconda3
      - echo "✅ Miniconda installé à ~/miniconda3"

  ollama-setup:
    desc: Installer Ollama
    cmds:
      - task: utils:confirm
        vars: { TASK: "Ollama (moteur de modèles d'IA local)" }
      - curl https://ollama.ai/install.sh | sh
      - echo "Ollama installé"

  parallel-setup:
    desc: Install environment tools in parallel where possible
    deps: [nvm-setup, conda-setup]
    cmds:
      - task: cuda:cuda-setup
      - task: ollama-setup
