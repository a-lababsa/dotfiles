version: "3"


includes:
  utils: ./scripts/utils.yml
  setup: ./tasks/setup.yml
  config: ./tasks/config.yml
  env: ./tasks/env.yml
  cuda: ./tasks/cuda.yml

dotenv: [".env"]

tasks:
  default:
    desc: Affiche l’aide
    silent: true
    cmds:
      - task --list-all

  doc:
    desc: Générer la documentation des tâches disponibles
    cmds:
      - task --list-all > TASKS.md && echo "✅ Documentation générée dans TASKS.md"

  all:
    desc: Installer tout l'environnement (tous les outils et configurations)
    cmds:
      - task: setup:install
      - task: env:nvm-setup
      - task: env:conda-setup
      - task: env:cuda-setup
      - task: config:install
      - echo "🚀 Installation complète terminée. Veuillez redémarrer votre terminal."




