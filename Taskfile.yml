version: "3"

vars:
  CUDA_VERSION: 12.8
  NVM_VERSION: 0.40.1

includes:
  utils: ./scripts/utils.yml

tasks:
  check-wsl:
    desc: Check if running in WSL2
    silent: true
    cmds:
      - |
        if [ -z "$(uname -r | grep -i microsoft)" ]; then
          echo "Error: This script must be run in WSL2"
          exit 1
        fi

  install:
    desc: Install configuration files
    cmds:
      - task: utils:confirm
        vars: { TASK: "les fichiers de configuration" }
      - chmod +x ./scripts/config-install.sh
      - ./scripts/config-install.sh ${PWD}
      
  install-task:
    desc: Install Task (taskfile.dev) task runner
    cmds:
      - task: utils:confirm
        vars: { TASK: "Task (gestionnaire de tâches)" }
      - chmod +x ./scripts/config-install.sh
      - ./scripts/config-install.sh ${PWD} --install-task
      
  task-only:
    desc: Only install Task without configuration files
    cmds:
      - task: utils:confirm
        vars: { TASK: "uniquement Task (sans fichiers de configuration)" }
      - mkdir -p ./scripts
      - chmod +x ./scripts/config-install.sh || cp -f ${PWD}/scripts/config-install.sh ./scripts/config-install.sh
      - ./scripts/config-install.sh ${PWD} --install-task --only

  install-essential-packages:
    desc: Install essential packages
    cmds:
      - task: utils:confirm
        vars: { TASK: "les paquets essentiels" }
      - echo "Updating and installing essential packages..."
      - sudo apt update && sudo apt upgrade -y
      - sudo apt install -y zsh vim git curl wget build-essential wslu python3 python3-pip
      - |
        echo "Would you like to set zsh as your default shell? [y/N] "
        read yn
        if [ "$yn" = "y" ]; then
          chsh -s $(which zsh)
          echo "Shell changed to zsh. Please log out and log back in for changes to take effect."
        fi

  install-starship:
    desc: Install Starship prompt
    cmds:
      - task: utils:confirm
        vars: { TASK: "Starship prompt" }
      - echo "Installing Starship prompt..."
      - curl -sS https://starship.rs/install.sh | sh
      - echo "Starship prompt installed"

  wsl-setup:
    desc: Setup basic WSL2 development environment
    deps: [install-essential-packages, install-starship, install-task]

  nvm-setup:
    desc: Install NVM (Node Version Manager)
    cmds:
      - task: utils:confirm
        vars: { TASK: "NVM (Node Version Manager) v{{.NVM_VERSION}}" }
      - echo Installing NVM version {{.NVM_VERSION}}...
      - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v{{.NVM_VERSION}}/install.sh | bash
      - echo NVM installed. Please restart your terminal or run 'source ~/.zshrc' to use NVM
      - echo You can install Node.js with = nvm install --lts

  conda-setup:
    desc: Setup Miniconda
    cmds:
      - task: utils:confirm
        vars: { TASK: "Miniconda (gestionnaire d'environnements Python)" }
      - echo "Installing Miniconda3..."
      - wget https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -O ~/miniconda3/miniconda.sh
      - bash ~/miniconda3/miniconda.sh -b -u -p ~/miniconda3
      - rm ~/miniconda3/miniconda.sh
      - echo "Miniconda installed to ~/miniconda3"
      - echo "Please run 'eval \"$(~/miniconda3/bin/conda shell.bash hook)\"' to initialize conda"
      - echo "You may want to add this to your .bashrc or .zshrc"

  ollama-setup:
    desc: Install Ollama
    deps: [check-wsl]
    cmds:
      - task: utils:confirm
        vars: { TASK: "Ollama (moteur de modèles d'IA local)" }
      - |
        if command -v ollama >/dev/null 2>&1; then
          echo "Ollama is already installed. Current version:"
          ollama --version
          read -p "Continue with installation? [y/N] " yn
          if [ "$yn" != "y" ]; then
            exit 1
          fi
        fi
      - echo "Installing Ollama..."
      - curl https://ollama.ai/install.sh | sh
      - echo "Verifying Ollama installation..."
      - cmd: ollama --version
        ignore_error: true
      - echo "Ollama installed successfully"

  cuda-setup:
    desc: Setup CUDA
    deps: [check-wsl]
    cmds:
      - task: utils:confirm
        vars: { TASK: "CUDA {{.CUDA_VERSION}} (pour calculs GPU)" }
      - chmod +x ./scripts/cuda-install.sh
      - ./scripts/cuda-install.sh {{.CUDA_VERSION}}

  init-scripts:
    desc: Create script directories and extract installation scripts
    silent: true
    cmds:
      - mkdir -p ./scripts
      - echo "Creating installation scripts..."
      - cp -f ${PWD}/scripts/cuda-install.sh ./scripts/cuda-install.sh || { echo "Creating cuda-install.sh"; cat > ./scripts/cuda-install.sh << 'EOL'

  all:
      desc: Install everything
      cmds:
        - task: utils:confirm
          vars: { TASK: "l'ENVIRONNEMENT COMPLET (tous les outils et configurations)" }
        - task: init-scripts
          silent: true
        - task: check-wsl
          silent: true
        - task: wsl-setup
        - task: nvm-setup
        - task: conda-setup
        - task: cuda-setup
        - task: ollama-setup
        - task: install
        - echo "Complete development environment setup finished!"
        - echo "Please restart your terminal for all changes to take effect."
  
  default:
      desc: Display help information
      silent: true
      cmds:
        - task --list-all