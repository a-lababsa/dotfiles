version: "3"

tasks:
  confirm:
    desc: Confirm before proceeding with installation
    silent: true
    cmds:
      - |
        echo "=== Vous êtes sur le point d'installer: {{.TASK}} ==="
        echo "Cette opération peut modifier votre système."
        read -p "Voulez-vous continuer ? [y/N] " yn
        if [ "$yn" != "y" ] && [ "$yn" != "Y" ]; then
          echo "Installation annulée."
          exit 1
        fi
        echo "Continuation de l'installation..."